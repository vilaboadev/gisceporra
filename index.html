<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Gisceporra Mundial 2026</title>
  <link rel="stylesheet" href="./src/styles.css" />

  <!-- Supabase config (injected by CI/CD) -->
  <script>
    window.__SUPABASE_CONFIG = {
      url: '__SUPABASE_URL__',
      anonKey: '__SUPABASE_ANON_KEY__'
    };
  </script>
</head>
<body>

  <!-- ═══════════════ LOGIN SCREEN ═══════════════ -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">⚽</div>
      <h1 class="login-title">Gisceporra<br><span>Mundial 2026</span></h1>
      <form id="login-form" autocomplete="on" novalidate>
        <div class="form-group">
          <label for="login-username">Usuari</label>
          <input id="login-username" type="text" autocomplete="username"
                 placeholder="Ex: MVF" spellcheck="false" />
        </div>
        <div class="form-group">
          <label for="login-password">Contrasenya</label>
          <input id="login-password" type="password" autocomplete="current-password"
                 placeholder="Contrasenya" />
        </div>
        <p id="login-error" class="login-error" role="alert"></p>
        <button type="submit" class="btn-primary">Entrar</button>
      </form>
      <p class="login-hint muted">Demo: <strong>test</strong> / <strong>test</strong></p>
    </div>
  </div>

  <!-- ═══════════════ APP ═══════════════ -->
  <div id="app" class="hidden">

    <!-- Top Header -->
    <header id="app-header">
      <div class="header-left">
        <div id="user-avatar" class="avatar">??</div>
        <span id="user-label" class="user-label"></span>
      </div>
      <div class="header-title">🏆 Gisceporra 2026</div>
      <button id="logout-btn" class="btn-icon" title="Sortir">⎋</button>
    </header>

    <!-- Main Content -->
    <main id="main-content">

      <!-- ── SCREEN: Notícies ── -->
      <section id="screen-noticies" class="screen hidden">
        <div id="home-live"></div>
        <div id="home-alerts"></div>
        <div id="home-recent"></div>
      </section>

      <!-- ── SCREEN: Porra & Ranking ── -->
      <section id="screen-porra" class="screen hidden">
        <div id="porra-ranking"></div>

        <h3 class="section-h">Apostes Eliminatòria</h3>
        <div id="bet-container"><p class="muted">Carregant…</p></div>
      </section>

      <!-- ── SCREEN: Mundial ── -->
      <section id="screen-mundial" class="screen hidden">
        <!-- Tab bar -->
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="partits">⚽ Partits</button>
          <button class="tab-btn" data-tab="grups">📊 Grups</button>
          <button class="tab-btn" data-tab="bracket">🔝 Eliminatòries</button>
        </div>
        <div class="mundial-meta">
          <span id="mundial-status" class="muted"></span>
          <button id="refresh-mundial" class="btn-icon" title="Actualitzar">↻</button>
        </div>

        <!-- Tab contents -->
        <div id="tab-partits" class="tab-content"></div>
        <div id="tab-grups" class="tab-content hidden"></div>
        <div id="tab-bracket" class="tab-content hidden"></div>
      </section>

    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
      <button class="nav-btn" data-nav="noticies">
        <span class="nav-icon">📰</span>
        <span class="nav-label">Notícies</span>
      </button>
      <button class="nav-btn" data-nav="porra">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">Porra</span>
      </button>
      <button class="nav-btn" data-nav="mundial">
        <span class="nav-icon">🌍</span>
        <span class="nav-label">Mundial</span>
      </button>
    </nav>

  </div><!-- /#app -->

  <script type="module" src="./src/app.js"></script>
</body>
</html>
