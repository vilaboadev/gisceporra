name: Deploy to GitHub Pages
 
on:
   push:
     branches: [main]
   workflow_dispatch:
 
permissions:
   contents: read
   pages: write
   id-token: write
 
concurrency:
   group: pages
   cancel-in-progress: true
 
jobs:
   deploy:
     runs-on: ubuntu-latest
     environment:
       name: github-pages
       url: ${{ steps.deployment.outputs.page_url }}
     steps:
       - uses: actions/checkout@v4
 
       - name: Inject API token into index.html
         env:
           TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
         run: |
           sed -i "s|// window.__FOOTBALL_DATA_TOKEN = 'EL_TEU_TOKEN_AQUI';|window.__FOOTBALL_DATA_TOKEN = '${TOKEN}';|" index.html
       - name: Inject Supabase config
         env:
           SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
           SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
         run: |
           sed -i "s|__SUPABASE_URL__|${SUPABASE_URL}|g" index.html
           sed -i "s|__SUPABASE_ANON_KEY__|${SUPABASE_ANON_KEY}|g" index.html

       - uses: actions/configure-pages@v5
 
       - uses: actions/upload-pages-artifact@v3
         with:
           path: .
 
       - id: deployment
         uses: actions/deploy-pages@v4
